<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Assignment 0</title>
  </head>
  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>

    <br/>

    <!-- Step 3 & 4: Vector input controls -->
    <p>
      <b>v1:</b>
      x: <input type="number" id="v1x" value="2.25" step="0.25" style="width:60px">
      y: <input type="number" id="v1y" value="2.25" step="0.25" style="width:60px">
      &nbsp;&nbsp;
      <b>v2:</b>
      x: <input type="number" id="v2x" value="3.5" step="0.25" style="width:60px">
      y: <input type="number" id="v2y" value="0" step="0.25" style="width:60px">
      &nbsp;&nbsp;
      <input type="button" value="Draw" onclick="handleDrawEvent()">
    </p>

    <!-- Step 5-8: Operation controls -->
    <p>
      Operation:
      <select id="op-select">
        <option value="add">Add</option>
        <option value="sub">Subtract</option>
        <option value="mul">Multiply</option>
        <option value="div">Divide</option>
        <option value="magnitude">Magnitude</option>
        <option value="normalize">Normalize</option>
        <option value="angle">Angle Between</option>
        <option value="area">Area</option>
      </select>
      &nbsp;
      Scalar: <input type="number" id="scalar" value="1.5" step="0.25" style="width:60px">
      &nbsp;
      <input type="button" value="Draw Operation" onclick="handleDrawOperationEvent()">
    </p>

    <!-- Load the matrix library first, then our script -->
    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="asg0.js"></script>
  </body>
</html>
